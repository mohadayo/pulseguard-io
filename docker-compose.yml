services:
  api-gateway:
    build:
      context: ./services/api-gateway
    ports:
      - "${API_PORT:-8001}:8001"
    environment:
      - API_PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  health-checker:
    build:
      context: ./services/health-checker
    ports:
      - "${CHECKER_PORT:-8002}:8002"
    environment:
      - CHECKER_PORT=8002
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  analytics-dashboard:
    build:
      context: ./services/analytics-dashboard
    ports:
      - "${DASHBOARD_PORT:-8003}:8003"
    environment:
      - DASHBOARD_PORT=8003
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
